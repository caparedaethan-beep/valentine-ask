<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Envelope</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="valentines">
    <div class="envelope">
        <div class="card">
            <img src="Add a heading.jpg" alt="Valentine Message" class="card-image">
        </div>
    </div>
    <div class="front"></div>
    
    <img src="lily3.png" class="card-image-2">
    <img src="text1.png" class="card-image-3">
    <img src="text2.png" class="card-image-4">
    <img src="photobooth2.png" class="card-image-5">
    <img src="heart.png" class="card-image-6">
    <img src="goldseal.png" class="card-image-7">
    </div>
    <div class="scroll-arrow" id="movingArrow"></div>
    <div class="heart-arrow" id="movingArrow"></div>
    <div>  <img src="letter.png" class="card-image-9"> </div>
    <div>  <img src="picture.png" class="card-image-8"> </div>
     <div>  <img src="heartseal.png" class="card-image-10"> </div>
     <div>  <img src="te1.png" class="card-image-11"> </div>
     <div>  <img src="te2 (2).png" class="card-image-12"> </div>
     <div>  <img src="te2.png" class="card-image-13"> </div>
     <div>  <img src="te3.png" class="card-image-14"> </div>
     <div>  <img src="te4.png" class="card-image-15"> </div>
     <div>  <img src="te5.png" class="card-image-16"> </div>
     <div>  <img src="te6.png" class="card-image-17"> </div>
     <div>  <img src="te7.png" class="card-image-18"> </div>
     <div class="buttons" id="letter-buttons">
        <div>  <img src="valentine.png" class="card-image-22"> </div>
          <div>  <img src="snoopy.png" class="card-image-19"> </div>
          <img src="yes (2).png" class="card-image-20" alt="Yes" />

          <div class="no-wrapper">
            <img src="no (2).png" class="card-image-21" alt="No" />
          </div>
          
        </div>
    </div> 

    </div>
    
    
    <script src="script.js"></script> </body>
</body>
</html>
